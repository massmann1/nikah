<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Трекер привычек - Офлайн</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top right, #fed9c6 0%, transparent 35%), #f4f8fc;
        color: #1d2736;
        padding: 24px;
      }
      .card {
        width: min(420px, 100%);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(121, 140, 173, 0.25);
        padding: 22px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0;
        font-size: 28px;
      }
      p {
        margin: 10px 0 0;
        color: #44506b;
        line-height: 1.45;
      }
      a {
        display: inline-block;
        margin-top: 16px;
        border-radius: 14px;
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 600;
        color: #fff;
        background: #ff7a59;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: radial-gradient(circle at top right, rgba(255, 122, 89, 0.16) 0%, transparent 35%), #111523;
          color: #f2f6fc;
        }
        .card {
          background: rgba(22, 27, 42, 0.92);
          border-color: rgba(89, 106, 139, 0.42);
        }
        p {
          color: #a9b5cc;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Вы офлайн</h1>
      <p>Приложение доступно из кеша. Откройте его и продолжайте вести трекинг. Данные хранятся только на вашем устройстве.</p>
      <a href="/today">Открыть приложение</a>
    </div>
  </body>
</html>
